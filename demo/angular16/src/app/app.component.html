<weg-header
  [layout]="headerLayout"
  [signedIn]="signedIn"
  [userName]="userName"
  [currentPath]="currentPath"
  (wegAuthClick)="onAuthClick($event)"
></weg-header>

<main class="demo">
  <h1>weg-shared-layout — Angular 16</h1>
  <p>
    Header and footer load layout from
    <code>GET https://dev.warwickemploymentgroup.com/api/v1/weg21</code> and
    <code>/menus</code>, mapped to the <code>layout</code> prop. Falls back to
    <code>weg-shared-layout/weg21-bootstrap.json</code> and
    <code>weg-shared-layout/weg21-menus.json</code> when the API is unavailable.
  </p>
  <p *ngIf="loadError" class="demo-notice">{{ loadError }}</p>
  <button type="button" class="demo-toggle" (click)="toggleSignedIn()">
    {{ signedIn ? 'Switch to signed out' : 'Switch to signed in' }}
  </button>
</main>

<router-outlet></router-outlet>

<weg-footer [layout]="layoutData"></weg-footer>
