<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>weg-shared-layout</title>

    <script type="module" src="/build/weg-shared-layout.esm.js"></script>
    <script nomodule src="/build/weg-shared-layout.js"></script>
  </head>
  <body>
    <h2 style="margin: 0 0 12px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Footer</h2>
    <weg-footer id="footer"></weg-footer>

    <script type="module">
      // The host app fetches the layout data and passes it in as a prop.
      // In production this would hit https://weg-payload-test.vercel.app/api/layout.
      const res = await fetch('/assets/dummy-data.json');
      const layout = await res.json();
      document.getElementById('footer').data = layout;
    </script>
  </body>
</html>
