<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>weg-shared-layout playground</title>
    <script type="module" src="/build/weg-shared-layout.esm.js"></script>
    <script nomodule src="/build/weg-shared-layout.js"></script>
  </head>
  <body style="margin: 0;">
    <weg-header signed-in user-name="John Doe"></weg-header>
    <p style="border:20px solid darkgreen;margin:0;padding:20px;text-align:center">Signed in header</p>
    <weg-header id="header"></weg-header>
    <p style="border:20px solid darkred;margin:0;padding:20px;text-align:center">Signed out header</p>
    <weg-footer id="footer"></weg-footer>
    <script type="module">
      const WEG21_API = 'https://dev.warwickemploymentgroup.com/api/v1/weg21';

      function toLayoutData(bootstrap, menus) {
        return {
          header: { menu: menus.header.ext },
          footer: {
            menu: menus.footer,
            social: bootstrap.footer.social_links,
            credits: bootstrap.footer.credit || undefined,
            copyright: bootstrap.footer.copyright || undefined,
          },
        };
      }

      async function loadLayout() {
        try {
          const [bootstrapRes, menusRes] = await Promise.all([
            fetch(WEG21_API, { headers: { accept: 'application/json' } }),
            fetch(`${WEG21_API}/menus`, { headers: { accept: 'application/json' } }),
          ]);
          if (!bootstrapRes.ok || !menusRes.ok) throw new Error('WEG21 API unavailable');
          return toLayoutData(await bootstrapRes.json(), await menusRes.json());
        } catch {
          const [bootstrapRes, menusRes] = await Promise.all([
            fetch('/assets/weg21-bootstrap.json'),
            fetch('/assets/weg21-menus.json'),
          ]);
          return toLayoutData(await bootstrapRes.json(), await menusRes.json());
        }
      }

      const layout = await loadLayout();
      const header = document.getElementById('header');
      header.layout = layout;
      document.getElementById('footer').layout = layout;

      header.addEventListener('wegAuthClick', (event) => {
        event.preventDefault();
        console.log('wegAuthClick', event.detail.action);
      });
    </script>
  </body>
</html>
