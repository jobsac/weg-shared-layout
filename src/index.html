<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>WCMS Component Playground</title>
    <script type="module" src="/build/weg-shared-layout.esm.js"></script>
    <script nomodule src="/build/weg-shared-layout.js"></script>
  </head>
  <body style="margin: 0;">
    <weg-header signed-in user-name="John Doe"></weg-header>
    <p style="border:20px solid darkgreen;margin:0;padding:20px;text-align:center">Signed in header</p>
    <weg-header id="header"></weg-header>
    <p style="border:20px solid darkred;margin:0;padding:20px;text-align:center">Signed out header</p>
    <weg-footer id="footer"></weg-footer>
    <script type="module">
      const res = await fetch('/assets/dummy-data.json');
      const layout = await res.json();
      document.getElementById('header').layout = layout;
      document.getElementById('footer').layout = layout;
    </script>
  </body>
</html>
