<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>

    <script type="module" src="/build/weg-shared-layout.esm.js"></script>
    <script nomodule src="/build/weg-shared-layout.js"></script>
  </head>
  <body>
    <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>

    <div style="height: 24px"></div>

    <h2 style="margin: 0 0 12px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Footer (standard)</h2>
    <weg-footer
      variant="standard"
      company-name="WEG"
      company-number="12345678"
      social-links-src="/assets/footer-social-links.json"
      standard-links-src="/assets/footer-standard-links.json"
    ></weg-footer>

    <div style="height: 24px"></div>

    <h2 style="margin: 0 0 12px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Footer (additional)</h2>
    <weg-footer
      variant="additional"
      company-name="WEG"
      company-number="12345678"
      social-links-src="/assets/footer-social-links.json"
      additional-groups-src="/assets/footer-additional-groups.json"
    ></weg-footer>
  </body>
</html>
